<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metrics Tracker - Meditate</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:100,300,400,500,700,900|Material+Icons" rel="stylesheet" type="text/css">
  <link href="https://cdn.jsdelivr.net/npm/quasar@2.18.6/dist/quasar.prod.css" rel="stylesheet" type="text/css">
  <style>
    .chart-container { width: 100%; height: 250px; }
  </style>
</head>
<body class="body--dark" style="background: #1d1d1d;">
  <div id="q-app">
    <q-layout view="hHh lpR fFf">
      <q-header bordered class="bg-dark">
        <q-toolbar>
          <q-btn flat round dense icon="arrow_back"></q-btn>
          <q-toolbar-title class="text-weight-bold">Meditate</q-toolbar-title>
        </q-toolbar>
      </q-header>

      <q-page-container>
        <q-page class="q-pa-md" style="background: #1d1d1d;">
          <!-- Time Range Toggles -->
          <div class="q-mb-md">
            <q-btn-group spread class="full-width">
              <q-btn v-for="r in timeRanges" :key="r.value" :label="r.label"
                :color="timeRange === r.value ? 'teal' : 'grey-8'"
                :text-color="timeRange === r.value ? 'white' : 'grey-4'"
                @click="timeRange = r.value" no-caps></q-btn>
            </q-btn-group>
          </div>

          <!-- Chart -->
          <q-card class="bg-grey-10 q-mb-md" dark>
            <q-card-section>
              <div class="text-subtitle2 text-grey-4 q-mb-sm">Count by {{ timeRangeLabel }}</div>
              <div id="main-chart" class="chart-container"></div>
            </q-card-section>
          </q-card>

          <!-- Data Table -->
          <q-card class="bg-grey-10" dark>
            <q-card-section>
              <div class="text-subtitle2 text-grey-4 q-mb-sm">Data</div>
              <q-table :rows="tableRows" :columns="tableColumns" row-key="period"
                dark flat hide-bottom class="bg-grey-10" :rows-per-page-options="[0]"></q-table>
            </q-card-section>
          </q-card>
        </q-page>
      </q-page-container>

      <!-- Log Entry FAB -->
      <q-page-sticky position="bottom-right" :offset="[24, 24]">
        <q-btn fab color="teal" icon="add" @click="showLog = true"></q-btn>
      </q-page-sticky>

      <!-- Log Entry Modal -->
      <q-dialog v-model="showLog" position="bottom">
        <q-card class="bg-grey-10" dark style="width: 100%; max-width: 500px;">
          <q-card-section>
            <div class="text-h6 text-white q-mb-md">Log Meditate</div>
            <div class="row q-col-gutter-sm q-mb-md">
              <div class="col-6">
                <q-input v-model="logDate" label="Date" dark filled>
                  <template v-slot:append>
                    <q-icon name="event" class="cursor-pointer">
                      <q-popup-proxy cover transition-show="scale" transition-hide="scale">
                        <q-date v-model="logDate" dark color="teal" mask="YYYY-MM-DD"></q-date>
                      </q-popup-proxy>
                    </q-icon>
                  </template>
                </q-input>
              </div>
              <div class="col-6">
                <q-input v-model="logTime" label="Time" dark filled>
                  <template v-slot:append>
                    <q-icon name="access_time" class="cursor-pointer">
                      <q-popup-proxy cover transition-show="scale" transition-hide="scale">
                        <q-time v-model="logTime" dark color="teal" mask="HH:mm"></q-time>
                      </q-popup-proxy>
                    </q-icon>
                  </template>
                </q-input>
              </div>
            </div>
            <q-btn color="teal" icon="check_circle" label="Log Entry" class="full-width" @click="submit"></q-btn>
          </q-card-section>
        </q-card>
      </q-dialog>
    </q-layout>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/vue@3/dist/vue.global.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/quasar@2.18.6/dist/quasar.umd.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5.6.0/dist/echarts.min.js"></script>
  <script>
    const app = Vue.createApp({
      setup() {
        const now = new Date();
        return {
          showLog: Vue.ref(false),
          logDate: Vue.ref(now.toISOString().slice(0, 10)),
          logTime: Vue.ref(now.toTimeString().slice(0, 5)),
          timeRange: Vue.ref('W'),
          timeRanges: [
            { label: 'D', value: 'D' }, { label: 'W', value: 'W' },
            { label: 'M', value: 'M' }, { label: '6M', value: '6M' }, { label: 'Y', value: 'Y' },
          ],
          chart: null,
        };
      },
      computed: {
        timeRangeLabel() {
          return { D: 'Hour', W: 'Day', M: 'Week', '6M': 'Month', Y: 'Month' }[this.timeRange] || 'Day';
        },
        chartData() {
          return {
            W: { labels: ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'], values: [1, 0, 1, 0, 0, 1, 0] },
            M: { labels: ['Week 1','Week 2','Week 3','Week 4'], values: [3, 4, 2, 5] },
            D: { labels: ['6AM','8AM','10AM','12PM','2PM','4PM','6PM'], values: [1, 0, 0, 0, 0, 0, 1] },
            '6M': { labels: ['Sep','Oct','Nov','Dec','Jan','Feb'], values: [12, 15, 10, 14, 18, 13] },
            Y: { labels: ['Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec','Jan','Feb'], values: [8, 12, 10, 14, 16, 15, 12, 15, 10, 14, 18, 13] },
          }[this.timeRange];
        },
        tableColumns() {
          return [
            { name: 'period', label: 'Period', field: 'period', align: 'left' },
            { name: 'value', label: 'Count', field: 'value', align: 'right' },
          ];
        },
        tableRows() {
          return this.chartData.labels.map((l, i) => ({ period: l, value: this.chartData.values[i] }));
        },
      },
      watch: {
        timeRange() { this.$nextTick(() => this.renderChart()); },
      },
      mounted() {
        setTimeout(() => this.renderChart(), 300);
      },
      methods: {
        renderChart() {
          if (!this.chart) this.chart = echarts.init(document.getElementById('main-chart'));
          this.chart.setOption({
            backgroundColor: 'transparent',
            grid: { top: 20, right: 20, bottom: 30, left: 40 },
            xAxis: { type: 'category', data: this.chartData.labels, axisLabel: { color: '#aaa', fontSize: 11 }, axisLine: { lineStyle: { color: '#555' } } },
            yAxis: { type: 'value', axisLabel: { color: '#aaa', fontSize: 11 }, splitLine: { lineStyle: { color: '#333' } } },
            series: [{ type: 'bar', data: this.chartData.values, itemStyle: { color: '#ab47bc', borderRadius: [6, 6, 0, 0] }, barWidth: '50%' }],
            tooltip: { trigger: 'axis', backgroundColor: '#333', borderColor: '#555', textStyle: { color: '#fff' } },
          }, true);
          this.chart.resize();
        },
        submit() {
          this.showLog = false;
          Quasar.Notify.create({ message: 'Meditation logged!', color: 'teal', position: 'top' });
        },
      }
    });
    app.use(Quasar, { config: { dark: true } });
    app.mount('#q-app');
  </script>
</body>
</html>
